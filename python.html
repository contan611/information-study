<p><a href="index.html">← 첫 화면</a></p><h1>파이썬 10~15차시</h1><p>코드를 외우기 전에, 명령어가 무엇을 받고 무엇을 돌려주는지 이해합니다.</p>
<ol><li><b>10차시: 딕셔너리</b> — 이름표(키)와 내용(값)을 짝지어 저장합니다.</li><li><b>11차시: 함수</b> — 자주 하는 일을 이름 붙여 다시 씁니다.</li><li><b>12차시: 문자열</b> — 글자를 저장하고 자르고 찾고 바꿉니다.</li><li><b>13차시: 파일 입출력</b> — 파일을 열고 읽고 쓰고 닫습니다.</li><li><b>14차시: 객체지향</b> — 데이터와 기능을 하나의 설계도로 묶습니다.</li><li><b>15차시: 판다스</b> — 표 형태의 데이터를 다룹니다.</li></ol>
