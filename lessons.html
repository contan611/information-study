<p><a href="index.html">← 첫 화면</a></p><h1>수업지도안 1~6차시</h1><p>원본 자료를 바탕으로 차시별 개념, 문제, 해설을 정리하는 공간입니다.</p>
<article><b>1차시</b><h2>정보와 데이터의 기초</h2><p>핵심 개념 → 예시 → 자체 문제 → 채점 → 자세한 해설 순서로 학습합니다.</p></article>
<article><b>2차시</b><h2>자료의 표현과 처리</h2><p>자료가 컴퓨터 안에서 어떤 모습으로 바뀌고 쓰이는지 배웁니다.</p></article>
<article><b>3차시</b><h2>알고리즘 기초</h2><p>문제를 풀기 위한 순서와 규칙을 배웁니다.</p></article>
<article><b>4~6차시</b><h2>문제 해결과 알고리즘</h2><p>문제를 나누고, 순서를 표현하고, 결과를 확인하는 방법을 배웁니다.</p></article>
