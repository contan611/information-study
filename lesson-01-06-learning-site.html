<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>수업지도안 1~6 학습실</title><style>
:root{--navy:#1e376f;--blue:#3478c9;--bg:#f4f7fb;--text:#17243b;--muted:#66738a;--line:#dce4f0;--green:#087968;--red:#bd4056;--gold:#986300}*{box-sizing:border-box}body{margin:0;font-family:Pretendard,"Malgun Gothic",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.75}.wrap{max-width:1080px;margin:auto;padding:26px 18px 64px}header{background:linear-gradient(120deg,#1e376f,#287e91);color:white;border-radius:22px;padding:32px}h1{margin:0;font-size:clamp(1.7rem,4vw,2.5rem)}header p{margin:8px 0 0;color:#e3f6f7}.home-note{background:#fff3ce;border-left:5px solid #da9d08;border-radius:8px;padding:13px 16px;margin:18px 0}.units{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}.unit{background:#fff;text-align:left;padding:20px;border:1px solid var(--line);border-radius:16px;box-shadow:0 3px 12px #1e376f13;cursor:pointer}.unit:hover{border-color:#6593d2;transform:translateY(-2px)}.unit b{display:block;color:var(--navy);font-size:1.1rem}.unit span{color:var(--muted);font-size:.94rem}.hidden{display:none}.back,.tab,button{font:inherit;font-weight:750;border:0;border-radius:9px;padding:9px 13px;cursor:pointer}.back{background:#e2eaf7;color:var(--navy);margin:0 0 14px}.lesson-head{background:#fff;border:1px solid var(--line);border-radius:16px;padding:21px}.lesson-head h2{margin:0;color:var(--navy)}.lesson-head p{margin:6px 0 0}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.tab{background:#e2e9f6;color:var(--navy)}.tab.active{background:var(--navy);color:white}.panel{display:none}.panel.active{display:block}.card{background:white;border:1px solid var(--line);border-radius:15px;padding:19px;margin:13px 0}.card h3{color:var(--navy);margin:0 0 7px}.key{background:#e9f6f4;border-radius:8px;padding:10px 13px;margin:10px 0}.warn{background:#fff6e1;border-left:4px solid #d49b16;border-radius:7px;padding:11px 13px}.q{background:#fff;border:1px solid var(--line);border-radius:15px;padding:18px;margin:13px 0}.q h3{margin:0 0 10px;font-size:1.03rem}.choice{display:block;border:1px solid #dce4f1;border-radius:8px;padding:8px 10px;margin:7px 0;cursor:pointer}.choice:hover{background:#f1f6ff}.choice input{margin-right:7px}.actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:18px 0}.grade{background:var(--green);color:#fff}.solution{background:#e2eaf7;color:var(--navy)}.result{font-weight:800}.mark{font-weight:800;margin:7px 0}.right{color:var(--green)}.wrong{color:var(--red)}.explain{display:none;background:#f1f5fb;border-left:4px solid #3b82c4;border-radius:7px;padding:12px 14px;margin-top:11px}.explain.show{display:block}.source{color:var(--muted);font-size:.92rem}.source a,a{color:#175ca9;font-weight:750}.frame{width:100%;height:820px;border:1px solid var(--line);border-radius:12px;background:#fff}code{background:#eef1f6;padding:1px 4px;border-radius:4px}@media(max-width:550px){.wrap{padding:14px 10px 40px}header{padding:23px}.frame{height:720px}}
</style></head><body><main class="wrap"><section id="portal"><header><h1>정보 학습실</h1><p>수업지도안과 파이썬을 섞지 않고, 필요한 묶음으로 들어가 한 차시씩 공부한다.</p></header><div class="home-note"><b>먼저 고르기:</b> AI·디지털 문화는 <b>수업지도안 1~6차시</b>, 코딩은 <b>파이썬 10~15차시</b>를 누르면 된다.</div><div class="units"><button class="unit" onclick="showGroup('guide')"><b>수업지도안 1~6차시</b><span>인공지능 · 기계학습 · 디지털 문화 · 정보 보호 · 정보 보안</span></button><button class="unit" onclick="showGroup('python')"><b>파이썬 10~15차시</b><span>딕셔너리 · 함수 · 문자열 · 파일 · 객체지향 · Pandas</span></button><button class="unit" onclick="location.href='colab-all-cells.html'"><b>코랩 필수학습코드</b><span>필수학습코드 · 다이어트 코드 · 출력 예측 연습</span></button></div></section><section id="home" class="hidden"><button class="back" onclick="goPortal()">← 처음 선택으로</button><header><h1 id="groupTitle"></h1><p id="groupIntro"></p></header><div class="home-note"><b>공부 순서:</b> 차시를 하나 고른 뒤 <b>① 설명·정리 → ② 자체제작 문제 → ③ 인수의 원본 문제</b> 순서로 하면 된다. 코딩을 몰라도 읽을 수 있게 용어부터 풀어 썼다.</div><div class="units" id="unitButtons"></div></section><section id="lesson" class="hidden"><button class="back" onclick="goHome()">← 차시 선택으로</button><div class="lesson-head"><h2 id="lessonTitle"></h2><p id="lessonIntro"></p><p class="source" id="lessonSource"></p></div><nav class="tabs"><button class="tab active" data-panel="learn" onclick="openTab('learn')">① 설명·정리</button><button class="tab" data-panel="practice" onclick="openTab('practice')">② 자체제작 문제</button><button class="tab" data-panel="original" onclick="openTab('original')">③ 인수의 원본 문제</button></nav><section id="learn" class="panel active"></section><section id="practice" class="panel"></section><section id="original" class="panel"></section></section></main><script>
const lessons=[
{n:'1차시',title:'인공지능과 지능 에이전트',url:'https://jsinsoo.github.io/test/t401.html',pdf:'https://jsinsoo.github.io/pdf/401.pdf',intro:'AI가 “생각한다”는 말을 시험용 개념으로 바꾸면, 환경을 알아차리고 판단한 뒤 행동하는 시스템이라는 뜻이다.',blocks:[
['AI와 지능 에이전트','<b>인공지능(AI)</b>은 탐색·추론·학습 같은 인간의 지적 능력 일부를 컴퓨터로 구현한 기술이다. <b>에이전트</b>는 사람 대신 어떤 일을 자동으로 처리하는 대리 시스템이고, 그 에이전트에 AI의 인식·판단 능력이 더해진 것이 <b>지능 에이전트</b>다.'],
['세 단계만 잡자: 인식 → 판단 → 행동','지능 에이전트는 먼저 <b>센서</b>나 사용자 입력으로 주변 정보를 <b>인식</b>한다. 다음으로 무엇을 할지 <b>판단</b>한다. 마지막으로 바퀴·모터·스피커·화면 같은 <b>구동기(액추에이터)</b>를 통해 <b>행동</b>한다. 챗봇이라면 질문 읽기→답 고르기→화면에 답 출력 순서다.'],
['PEAS와 에이전트 종류','PEAS는 P=성능 척도(얼마나 잘했는가), E=환경, A=행동 장치, S=센서다. 단순 반사 에이전트는 현재 입력만 보고 즉시 반응한다. 모델 기반은 내부 상태·기억도 쓴다. 목표 기반은 목표 달성을 보고, 효용 기반은 효율·안전·만족도 중 무엇이 더 좋은지 비교한다.'],
['AI와 인간의 역할','AI는 많은 데이터를 기억하고 반복·위험 작업, 빠른 계산에 강하다. 인간은 문제를 정확히 정의하고, 결과가 윤리적·안전한지 책임 있게 점검한다. AI가 감정을 분석하거나 흉내 낼 수 있어도 실제 감정을 느끼는 것은 아니다.']],qs:[
['로봇청소기의 먼지 감지 장치는 무엇인가?',['센서','구동기','성능 척도','목표'],0,'먼지를 알아차려 환경 정보를 받아들이므로 <b>센서</b>다. 바퀴 모터처럼 실제 움직임을 만드는 것은 구동기다.'],
['챗봇이 답변을 화면에 보여 주는 것은?',['인식','판단','행동','학습'],2,'질문을 읽는 것은 인식, 답을 고르는 것은 판단, 화면에 결과를 내보내는 것은 <b>행동</b>이다.'],
['PEAS의 P는 무엇인가?',['Programming','Performance measure(성능 척도)','Python','Prediction'],1,'P는 에이전트가 얼마나 잘했는지 판단하는 <b>성능 척도</b>다.'],
['현재 입력만 보고 조건-행동 규칙으로 움직이는 에이전트는?',['단순 반사','모델 기반','목표 기반','효용 기반'],0,'단순 반사는 과거 기억이나 장기 계획보다 현재 지각에 즉시 반응한다.'] ]},
{n:'2차시',title:'기계학습의 이해',url:'https://jsinsoo.github.io/test/t402.html',pdf:'https://jsinsoo.github.io/pdf/402.pdf',intro:'기계학습은 사람이 모든 규칙을 직접 적어 주는 대신, 데이터 속 규칙을 컴퓨터가 찾게 하는 방식이다.',blocks:[
['기존 프로그래밍과 차이','기존 프로그래밍은 <b>데이터 + 사람이 만든 규칙 → 결과</b>다. 기계학습은 <b>데이터 + 원하는 정답 → 컴퓨터가 규칙(모델)을 학습</b>한다. 개·고양이 사진과 정답을 많이 보여 주면, 모델이 둘을 구별하는 특징을 찾는다.'],
['지도학습','<b>정답(레이블)</b>이 있는 데이터로 배우는 방식이다. 모델을 만들 때 쓰는 것은 <b>훈련 데이터</b>, 처음 보는 데이터에서 제대로 되는지 확인하는 것은 <b>테스트 데이터</b>다.'],
['회귀·분류','둘 다 지도학습이다. <b>회귀</b>는 기온·집값처럼 이어지는 수치를 예측한다. <b>분류</b>는 스팸/정상, 개/고양이처럼 정해진 범주 중 하나를 고른다.'],
['비지도학습·군집','<b>비지도학습</b>은 정답 없이 데이터의 특징을 분석해 패턴을 찾는다. 비슷한 것끼리 묶는 것을 <b>군집</b>이라고 한다.']],qs:[
['정답 레이블이 있는 데이터로 학습하는 것은?',['지도학습','비지도학습','군집','마스킹'],0,'정답을 함께 알려 주며 배우는 것은 <b>지도학습</b>이다.'],
['집값을 예측하는 문제는?',['분류','회귀','군집','암호화'],1,'집값은 연속적으로 변하는 수치이므로 <b>회귀</b>다.'],
['스팸/정상 중 하나를 고르는 문제는?',['회귀','분류','비지도학습','전처리'],1,'미리 정한 범주 중 하나를 선택하므로 <b>분류</b>다.'],
['테스트 데이터를 사용하는 주된 이유는?',['파일 용량 감소','새 데이터에도 잘 맞는지 평가','정답 삭제','코드 단축'],1,'훈련 데이터만 외웠는지 확인하려면 처음 보는 <b>테스트 데이터</b>로 평가해야 한다.'] ]},
{n:'3차시',title:'기계학습을 이용한 문제 해결',url:'https://jsinsoo.github.io/test/t403.html',pdf:'https://jsinsoo.github.io/pdf/403.pdf',intro:'AI를 쓰기 전에 “무엇을 풀지, 데이터가 있는지, 결과가 좋은지”를 차례대로 확인하는 방법을 배운다.',blocks:[
['문제 정의부터','현재 상태와 목표 상태, 핵심 요소를 분명히 정하는 것이 <b>문제 정의</b>다. 충분한 양·품질의 데이터가 있고 적절한 모델을 만들 수 있을 때 기계학습으로 해결할 가능성이 높다.'],
['전체 순서','<b>문제 정의 → 데이터 탐색·수집 → 전처리 → 학습 유형·알고리즘 선택 → 모델 학습 → 평가 → 개선</b> 순서다. 중요한 것은 데이터를 바로 넣지 않고 먼저 정리하며, 학습 후 반드시 평가한다는 점이다.'],
['전처리·특성 공학','<b>전처리</b>는 오류·빈칸을 고치고 형태를 바꾸는 일이다. <b>특성 공학</b>은 날짜에서 요일, 생년월일에서 나이처럼 기존 데이터에서 새 정보를 만드는 일이다. 품질 낮은 데이터는 나쁜 결과를 만들 수 있다(Garbage In, Garbage Out).'],
['스케일링·튜닝','<b>특성 스케일링</b>은 키·소득처럼 범위가 다른 값을 비교하기 좋게 조정하는 일이다. StandardScaler는 평균 0, 표준편차 1 부근으로 만든다. <b>하이퍼파라미터</b>는 모델이 자동으로 찾는 값이 아니라 사람이 정하거나 바꿔 보는 값(예: max_depth)이다.']],qs:[
['기계학습 문제 해결의 첫 단계는?',['모델 학습','문제 정의','그래프 그리기','파일 저장'],1,'무엇을 해결할지부터 분명해야 필요한 데이터와 성공 기준을 정할 수 있다.'],
['오류·빈칸을 고쳐 학습 가능한 형태로 만드는 단계는?',['전처리','예측','군집','암호화'],0,'데이터를 학습 전에 정리하는 작업이 <b>전처리</b>다.'],
['날짜에서 요일 열을 새로 만드는 것은?',['특성 공학','분류','피싱','상속'],0,'기존 정보에서 모델에 도움 될 새 입력값을 만드는 것이 <b>특성 공학</b>이다.'],
['max_depth 같은 사람 설정값은?',['레이블','하이퍼파라미터','센서','구동기'],1,'학습 전에 사람이 정하거나 바꾸며 성능을 비교하는 값이 하이퍼파라미터다.'] ]},
{n:'4차시',title:'디지털 기술과 진로 설계',url:'https://jsinsoo.github.io/test/t501.html',pdf:'https://jsinsoo.github.io/pdf/501.pdf',intro:'디지털 기술은 IT 직업만의 일이 아니라, 각자의 전공·관심사와 결합해 새로운 일을 만드는 도구다.',blocks:[
['디지털 기술','디지털 정보를 처리·저장·전송하는 기술이다. 대표적으로 인공지능, 빅데이터, 사물 인터넷(IoT), 클라우드가 있다. 개인 맞춤 서비스나 시설 관리, 사고 예방 등에 활용된다.'],
['디지털 전환(DX)','DX는 단순히 종이 문서를 컴퓨터로 옮기는 것보다 넓다. 디지털 기술로 조직의 업무 방식·서비스·문화·전략을 혁신하는 변화다. 온라인 민원 서비스나 스마트팜이 예다.'],
['융합과 T자형 인재','<b>융합</b>은 서로 다른 분야가 만나 새 가치를 만드는 것. 생명과학+정보과학의 생물정보학이 예다. <b>T자형 인재</b>는 한 분야의 깊은 전문성(세로)과 여러 분야를 연결하고 IT를 활용하는 폭넓은 역량(가로)을 모두 가진 사람이다.'],
['평생 학습','기술과 직업은 바뀌므로 학교를 졸업한 뒤에도 배우고 적응하는 <b>평생 학습</b>이 중요하다.']],qs:[
['DX의 설명으로 알맞은 것은?',['컴퓨터 한 대 구매','디지털 기술로 업무·서비스 방식을 혁신','인터넷만 빠르게 만들기','종이 문서를 늘리기'],1,'DX는 도구 교체가 아니라 디지털 기술로 운영과 서비스 방식을 바꾸는 변화다.'],
['생명과학+정보과학의 융합 분야는?',['생물정보학','피싱','회귀','군집'],0,'생명 데이터를 정보과학 기법으로 분석하는 융합 분야가 생물정보학이다.'],
['T자형 인재의 세로획은?',['전공의 깊이','모든 분야 얕은 지식','키','인터넷 속도'],0,'세로는 한 분야의 깊은 전문성, 가로는 폭넓은 연결 역량이다.'],
['평생 학습이 중요한 이유는?',['시험이 없어서','기술 환경이 계속 변해서','AI가 금지돼서','종이를 쓰기 위해서'],1,'변화하는 기술과 사회에 적응하려면 계속 배우는 태도가 필요하다.'] ]},

function takeArray(source,name){let at=source.indexOf('const '+name+' =');if(at<0)throw Error(name);let a=source.indexOf('[',at),d=0,q='',esc=false,end=a;for(;end<source.length;end++){let c=source[end];if(q){if(esc)esc=false;else if(c==='\\')esc=true;else if(c===q)q='';continue}if(c==='"'||c==="'"||c==='`'){q=c;continue}if(c==='[')d++;if(c===']'&&--d===0){end++;break}}return Function('return ('+source.slice(a,end)+')')()}
function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
function norm(s){return String(s).trim().replace(/\r/g,'').split('\n').map(x=>x.trim()).filter(Boolean).join('\n')}
async function loadOriginal(l){let root=document.querySelector('#originalList');try{let text=await fetch(l.url).then(r=>{if(!r.ok)throw Error('불러오기 실패');return r.text()});let code=takeArray(text,'codeQuestions'),ox=takeArray(text,'oxQuestions'),mc=takeArray(text,'mcqQuestions');root.innerHTML=`<div class="warn"><b>원본 문항 ${code.length+ox.length+mc.length}개를 가져왔어.</b> 코드 출력·OX·객관식을 모두 풀고 <b>원본 문제 채점하기</b>를 누른 뒤 해설을 보자.</div><h2>원본 코드 출력 문제</h2>${code.map((x,i)=>`<article class="q"><h3>${i+1}. ${x.q}</h3><pre>${esc(x.code)}</pre><textarea id="oc${i}" style="width:100%;min-height:80px" placeholder="출력 결과를 줄바꿈까지 적어 보세요."></textarea><div id="omc${i}" class="mark"></div><div id="oec${i}" class="explain"><b>정답 출력</b><pre>${esc(x.ans)}</pre><b>아주 자세한 풀이</b><br>${x.sol}</div></article>`).join('')}<h2>원본 OX 문제</h2>${ox.map((x,i)=>`<article class="q"><h3>${i+1}. ${x[0]}</h3><label class="choice"><input type="radio" name="ox${i}" value="O">O</label><label class="choice"><input type="radio" name="ox${i}" value="X">X</label><div id="omo${i}" class="mark"></div><div id="oeo${i}" class="explain"><b>정답: ${x[1]}</b><br>${x[2]}</div></article>`).join('')}<h2>원본 객관식 문제</h2>${mc.map((x,i)=>`<article class="q"><h3>${i+1}. ${x.q}</h3>${x.choices.map((c,j)=>`<label class="choice"><input type="radio" name="om${i}" value="${j+1}">${j+1}. ${c}</label>`).join('')}<div id="omm${i}" class="mark"></div><div id="oem${i}" class="explain"><b>정답: ${x.ans}. ${x.choices[x.ans-1]}</b><br>${x.sol}</div></article>`).join('')}<div class="actions"><button class="grade" onclick="gradeOriginal()">원본 문제 채점하기</button><button class="solution" onclick="showOriginalSolutions()">원본 해설 보기</button><span id="orResult" class="result"></span></div>`;window.original={code,ox,mc,graded:false}}catch(e){root.innerHTML=`<article class="card"><h3>문제를 불러오지 못했어</h3><p>인터넷 연결이 필요한 자료라서, 연결 뒤 차시를 다시 열어 봐. 그래도 안 되면 <a href="${l.url}" target="_blank">원본 수업지도안</a>을 열 수 있어.</p></article>`}}
function gradeOriginal(){let d=window.original;if(!d)return;let total=0,score=0;d.code.forEach((x,i)=>{let ok=norm(document.querySelector('#oc'+i).value)===norm(x.ans);total++;if(ok)score++;document.querySelector('#omc'+i).innerHTML=ok?'<span class="right">✓ 정답</span>':'<span class="wrong">✗ 오답</span>'});d.ox.forEach((x,i)=>{let p=document.querySelector(`input[name=ox${i}]:checked`),ok=p&&p.value===x[1];total++;if(ok)score++;document.querySelector('#omo'+i).innerHTML=ok?'<span class="right">✓ 정답</span>':'<span class="wrong">✗ 오답</span>'});d.mc.forEach((x,i)=>{let p=document.querySelector(`input[name=om${i}]:checked`),ok=p&&+p.value===x.ans;total++;if(ok)score++;document.querySelector('#omm'+i).innerHTML=ok?'<span class="right">✓ 정답</span>':'<span class="wrong">✗ 오답</span>'});d.graded=true;document.querySelector('#orResult').textContent=`${score} / ${total}점`}
function showOriginalSolutions(){if(!window.original||!window.original.graded){alert('먼저 원본 문제 채점하기를 눌러 주세요.');return}document.querySelectorAll('#originalList .explain').forEach(x=>x.classList.add('show'))}
function showGroup(group){activeGroup=group;activeLessons=group==='guide'?guideLessons:pythonLessons;document.querySelector('#portal').classList.add('hidden');document.querySelector('#home').classList.remove('hidden');document.querySelector('#groupTitle').textContent=group==='guide'?'수업지도안 1~6차시':'파이썬 10~15차시';document.querySelector('#groupIntro').textContent=group==='guide'?'인공지능과 디지털 문화 내용을 한 차시씩 공부합니다.':'코딩을 처음 보는 사람도 코드 읽기부터 차근차근 공부합니다.';makeHome()}function goPortal(){document.querySelector('#home').classList.add('hidden');document.querySelector('#portal').classList.remove('hidden');window.scrollTo({top:0,behavior:'smooth'})}function makeHome(){document.querySelector('#unitButtons').innerHTML=activeLessons.map((l,i)=>`<button class="unit" onclick="openLesson(${i})"><b>${l.n} · ${l.title}</b><span>${l.intro}</span></button>`).join('')}
function openLesson(i){current=i;graded=false;let l=activeLessons[i];document.querySelector('#home').classList.add('hidden');document.querySelector('#lesson').classList.remove('hidden');document.querySelector('#lessonTitle').textContent=l.n+' · '+l.title;document.querySelector('#lessonIntro').textContent=l.intro;document.querySelector('#lessonSource').innerHTML=`자료: <a target="_blank" href="${l.url}">수업지도안</a> · <a target="_blank" href="${l.pdf}">교과서 PDF</a>`;document.querySelector('#learn').innerHTML=l.blocks.map((b,i)=>`<article class="card"><h3>${i+1}. ${b[0]}</h3><p>${b[1]}</p></article>`).join('')+addProblemConcepts(l)+addTextbookExpansion(l)+`<div class="warn"><b>여기까지의 목표:</b> 단어를 통째로 외우기보다, ‘무엇과 무엇을 구별하는 말인지’를 말할 수 있으면 된다. 이제 문제를 풀고 이해가 빈 곳을 찾자.</div>`;loadDetailIntoLesson(l);document.querySelector('#practice').innerHTML=`<article class="card"><h3>자체제작 확인 문제</h3><p>답을 먼저 모두 고른 뒤 <b>채점하기</b>를 누르자. 채점 후에만 해설 보기 버튼이 작동한다.</p></article>${l.qs.map((q,i)=>`<article class="q"><h3>${i+1}. ${q[0]}</h3>${q[1].map((c,j)=>`<label class="choice"><input type="radio" name="q${i}" value="${j}">${c}</label>`).join('')}<div id="mark${i}" class="mark"></div><div id="ex${i}" class="explain"><b>정답: ${q[1][q[2]]}</b><br>${fullExplanation(l,q)}</div></article>`).join('')}<div class="actions"><button class="grade" onclick="grade()">채점하기</button><button class="solution" onclick="solutions()">해설 보기</button><span class="result" id="result"></span></div>`;document.querySelector('#original').innerHTML=`<article class="card"><h3>인수의 원본 문제</h3><p>수업지도안에서 <b>문제·정답·상세 풀이 데이터 자체</b>를 가져와 이 화면의 문제로 다시 구성한다. 불러오는 중…</p></article><div id="originalList"></div>`;(l.static?loadStaticOriginal(l):loadOriginal(l));openTab('learn');window.scrollTo({top:0,behavior:'smooth'})}
function goHome(){document.querySelector('#lesson').classList.add('hidden');document.querySelector('#home').classList.remove('hidden');window.scrollTo({top:0,behavior:'smooth'})}function openTab(id){document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));document.querySelector('#'+id).classList.add('active');document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.panel===id))}function grade(){let s=0;activeLessons[current].qs.forEach((q,i)=>{let pick=document.querySelector(`input[name=q${i}]:checked`),ok=pick&&+pick.value===q[2];if(ok)s++;document.querySelector('#mark'+i).innerHTML=ok?'<span class="right">✓ 정답</span>':'<span class="wrong">✗ 오답</span>'});graded=true;document.querySelector('#result').textContent=`${s} / ${activeLessons[current].qs.length}점`;}function solutions(){if(!graded){alert('먼저 채점하기를 눌러 주세요.');return}document.querySelectorAll('.explain').forEach(x=>x.classList.add('show'))}makeHome();
async function loadStaticOriginal(l){let r=document.querySelector('#originalList');try{let t=await fetch(l.pdf).then(x=>x.text()),d=new DOMParser().parseFromString(t,'text/html'),a=[...d.querySelectorAll('section.card')].map((x,i)=>({i:i+1,q:x.querySelector('.problem')?.textContent.trim(),ans:x.querySelector('.answer')?.textContent.trim(),sol:x.querySelector('.explain')?.textContent.trim(),code:[...x.querySelectorAll('pre')].map(p=>p.textContent.trim()).join('\n')}));r.innerHTML=`<div class="warn">인수의 원본 20문항을 이 화면에 가져왔다. 답을 직접 적고 채점한 뒤 해설을 보자.</div>${a.map(x=>`<article class="q"><h3>${x.i}. ${x.q}</h3>${x.code?`<pre>${esc(x.code)}</pre>`:''}<input id="sa${x.i}" style="width:100%;padding:9px" placeholder="정답 입력"><div id="sm${x.i}" class="mark"></div><div id="se${x.i}" class="explain"><b>정답: ${x.ans}</b><br>${x.sol}</div></article>`).join('')}<div class="actions"><button class="grade" onclick="staticGrade()">원본 문제 채점하기</button><button class="solution" onclick="staticSolve()">원본 해설 보기</button><span class="result" id="sr"></span></div>`;window.S=a;window.SG=false}catch(e){r.innerHTML=`<article class="card">원본 문제를 불러오지 못했습니다. <a href="${l.pdf}" target="_blank">원본 열기</a></article>`}}function staticGrade(){let n=0;S.forEach(x=>{let o=norm(document.querySelector('#sa'+x.i).value)===norm(x.ans);if(o)n++;document.querySelector('#sm'+x.i).innerHTML=o?'<span class="right">✓ 정답</span>':'<span class="wrong">✗ 오답</span>'});SG=true;document.querySelector('#sr').textContent=`${n} / ${S.length}점`}function staticSolve(){if(!SG){alert('먼저 채점하기를 눌러 주세요.');return}document.querySelectorAll('[id^=se]').forEach(x=>x.classList.add('show'))}
const problemConcepts={
'인공지능과 지능 에이전트':'<article class="card"><h3>원본 문제에 나오는 추가 개념</h3><p><b>튜링 테스트</b>: 사람과 대화할 때 기계인지 구별하기 어려운지를 보는 생각 실험이다. 자연스럽게 말한다고 진짜 이해한다는 보장은 없다는 한계가 있다.</p><p><b>내부 상태</b>: 지금 센서에 안 보이더라도 과거에 본 정보나 기억을 저장해 둔 것. 모델 기반 에이전트가 단순 반사 에이전트보다 복잡한 상황을 다루는 이유다.</p><p><b>클래스</b>: 상태(속성)와 행동(메서드)을 한 설계도에 묶는 파이썬 문법. 원본 코드에서 <code>class</code>가 보이면 “에이전트 한 명의 설계도”라고 읽으면 된다.</p></article>',
'기계학습의 이해':'<article class="card"><h3>원본 문제에 나오는 추가 개념</h3><p><b>X(특성)</b>: 모델에 넣는 입력 정보. 공부 시간, 출석률처럼 답을 맞히는 데 쓸 재료다. <b>y(레이블·타깃)</b>: 모델이 맞혀야 하는 정답이다.</p><p><b>fit()</b>: X와 y를 이용해 모델을 학습하는 메서드. <b>predict()</b>: 학습을 끝낸 모델에게 새 X를 주고 결과를 예측하게 하는 메서드다.</p><p><b>과적합</b>: 훈련 데이터 문제는 외웠지만 처음 보는 테스트 데이터에서는 약한 상태. 그래서 훈련 점수만 좋다고 좋은 모델이 아니다.</p></article>',
'기계학습을 이용한 문제 해결':'<article class="card"><h3>원본 문제에 나오는 추가 개념</h3><p><b>결측치</b>: 데이터에서 비어 있는 값. <code>fillna(0)</code>은 결측치를 0으로 채운다는 뜻이다.</p><p><b>일반화 성능</b>: 훈련 때 안 본 새 데이터에서도 잘 맞히는 능력. 모델 평가의 목표는 이 성능을 객관적으로 보는 것이다.</p><p><b>MinMaxScaler</b>: 보통 값을 0~1 범위로 바꾸는 도구다. StandardScaler와 목적은 비슷하지만 변환 방식은 다르다.</p></article>',
'디지털 기술과 진로 설계':'<article class="card"><h3>원본 문제에 나오는 추가 개념</h3><p><b>pandas</b>: 표 형태 데이터를 정리하고 분석하는 파이썬 라이브러리. <b>matplotlib</b>: 데이터를 그래프·차트로 그리는 라이브러리다.</p><p><b>connecting the dots</b>: 지금은 따로 보이는 경험이 나중에 진로·기회로 연결될 수 있다는 뜻으로 쓰인다.</p><p><b>전공+IT</b>: IT가 전공을 대체한다는 뜻이 아니라, 전공 문제를 더 잘 해결하는 도구가 될 수 있다는 뜻이다.</p></article>',
'정보 공유와 보호':'<article class="card"><h3>원본 문제에 나오는 추가 개념</h3><p><b>오픈소스</b>: 소스 코드를 공개하고 라이선스 조건에 따라 사용·수정·배포를 허용하는 모델. 공개됐다고 아무 조건 없이 써도 되는 것은 아니다.</p><p><b>CCL</b>: 저작권자가 일정 조건 아래 이용을 허락하는 라이선스. BY=저작자 표시, NC=비영리 등 조건을 확인한다.</p><p><b>비식별화</b>: 데이터를 모두 지우는 것이 아니라, 개인을 알아보기 어렵게 처리해 안전하게 활용하는 것. <b>마스킹</b>은 홍길동→홍*동처럼 일부를 가리는 방법이다.</p></article>',
'정보 보안과 디지털 윤리':'<article class="card"><h3>원본 문제에 나오는 추가 개념</h3><p><b>랜섬웨어</b>: 파일을 암호화하거나 사용을 막은 뒤 돈을 요구하는 악성코드. <b>웜</b>: 다른 파일에 붙지 않고 네트워크를 통해 스스로 퍼질 수 있는 악성코드다.</p><p><b>SQL 인젝션</b>: 입력값을 이용해 데이터베이스 명령 구조를 조작하는 공격. <b>XSS</b>: 웹페이지에 악성 스크립트를 넣어 다른 사람 브라우저에서 실행시키는 공격이다.</p><p><b>해시</b>: 비밀번호 원문을 그대로 저장하지 않기 위해 쓰는 일방향 변환값. <b>부인 방지</b>: 어떤 행위를 나중에 했다고 부정하기 어렵게 하는 보안 성질이다.</p></article>',
'딕셔너리':'<article class="card"><h3>문제에 나오는 핵심 개념</h3><p><b>keys()</b>는 키들, <b>values()</b>는 값들, <b>items()</b>는 (키, 값) 쌍을 다룬다. <b>setdefault()</b>는 키가 없을 때 기본값을 넣고 그 값을 돌려준다.</p></article>',
'함수':'<article class="card"><h3>문제에 나오는 핵심 개념</h3><p><b>lambda</b>는 이름 없는 짧은 함수. <b>재귀 함수</b>는 자기 자신을 다시 부르며, 반드시 멈추는 조건이 있어야 한다. <b>지역 변수</b>는 함수 안에서만 쓸 수 있다.</p></article>',
'문자열':'<article class="card"><h3>문제에 나오는 핵심 개념</h3><p><b>upper/lower</b>는 대소문자를 바꾼 새 문자열, <b>count</b>는 등장 횟수, <b>startswith/endswith</b>는 시작·끝 문자열을 확인한다.</p></article>',
'파일 입출력':'<article class="card"><h3>문제에 나오는 핵심 개념</h3><p><b>FileNotFoundError</b>는 읽으려는 파일이 없을 때 나는 오류. <b>try-except</b>로 오류가 나도 프로그램이 갑자기 멈추지 않도록 처리할 수 있다. <b>seek</b>는 파일 읽기 위치를 옮기고, <b>tell</b>은 현재 위치를 알려 준다.</p></article>',
'객체지향(OOP)':'<article class="card"><h3>문제에 나오는 핵심 개념</h3><p><b>클래스 변수</b>는 모든 객체가 공유, <b>인스턴스 변수</b>는 객체마다 따로 가진다. <b>다형성</b>은 같은 메서드 이름이라도 객체에 따라 다르게 동작하는 성질이다. <b>@staticmethod</b>는 self 없이 쓸 수 있는 정적 메서드다.</p></article>',
'Pandas 데이터 분석':'<article class="card"><h3>문제에 나오는 핵심 개념</h3><p><b>sort_values</b>는 정렬한 새 표를 반환한다. <b>groupby</b>는 같은 범주끼리 묶어 평균·합계·개수를 구한다. <b>read_csv</b>는 CSV를 읽고, <b>read_excel</b>은 엑셀 파일을 읽는다.</p></article>'};function addProblemConcepts(l){return problemConcepts[l.title]||''}
async function loadDetailIntoLesson(l){try{let html=await fetch('detailed-information-textbook.html').then(r=>r.text()),doc=new DOMParser().parseFromString(html,'text/html'),articles=[...doc.querySelectorAll('article')],hit=articles.find(a=>a.querySelector('h2')?.textContent.includes(l.n))||articles.find(a=>a.querySelector('h2')?.textContent.includes('파이썬'));if(hit){let box=document.createElement('article');box.className='card';box.innerHTML='<h3>아주 자세한 설명</h3>'+hit.innerHTML;document.querySelector('#learn').appendChild(box)}}catch(e){}}
const textbookExpansion={'인공지능과 지능 에이전트':'<article class="card"><h3>처음 배우는 사람을 위한 완전한 설명</h3><p>“지능”이라는 말을 들으면 사람처럼 생각하는 로봇을 떠올리기 쉽지만, 이 수업에서 중요한 것은 사람과 똑같은 존재인지가 아니다. <b>주변에서 정보를 받고, 그 정보로 선택하고, 실제 결과를 내는가</b>가 핵심이다. 예를 들어 자동문은 센서가 사람을 감지하고, 사람이 있다는 조건을 판단한 다음 문을 연다. 자동문은 현재 입력만 보고 행동하므로 단순 반사 방식에 가깝다.</p><p>문제에 로봇청소기·자율주행차·챗봇이 나오면 먼저 입력과 출력을 나누자. 카메라·마이크·거리 센서·사용자 질문은 입력(센서/인식)이다. 바퀴·브레이크·스피커·화면 답변은 출력(구동기/행동)이다. 그 사이에 ‘만약 장애물이 있으면 멈춘다’처럼 정보를 비교해 선택하는 부분이 판단이다.</p><p>서술형에서는 “지능 에이전트는 센서를 통해 환경 정보를 인식하고, 목표·규칙·상태를 바탕으로 행동을 판단한 뒤, 구동기를 통해 행동하는 자율적 컴퓨팅 개체이다.”라고 쓰면 핵심이 모두 들어간다.</p></article>',
'기계학습의 이해':'<article class="card"><h3>처음 배우는 사람을 위한 완전한 설명</h3><p>기계학습에서 컴퓨터가 ‘배운다’는 것은 사람처럼 내용을 이해한다는 뜻이 아니다. 많은 예시에서 <b>입력과 정답이 함께 나타나는 패턴</b>을 찾아, 새 입력이 왔을 때 가장 그럴듯한 답을 계산하는 모델을 만드는 것이다. 그래서 데이터의 양과 품질이 중요하다.</p><p>지도학습은 선생님이 답지를 같이 주는 연습이다. 공부 시간과 시험 점수를 함께 보여 주거나, 동물 사진과 개/고양이 답을 함께 보여 준다. 비지도학습은 답지를 주지 않고 비슷한 것끼리 묶어 보게 한다. 온라인 쇼핑몰이 비슷한 소비 습관을 가진 사람을 그룹으로 나누는 것이 예다.</p><p>분류와 회귀는 ‘정답 모습’으로 구분한다. 합격/불합격처럼 칸 중 하나를 고르면 분류, 내일 기온처럼 숫자가 이어질 수 있으면 회귀다. 시험에서는 “숫자니까 회귀”라는 실수를 조심해야 한다. 반 번호처럼 숫자가 단지 이름표라면 분류다.</p></article>',
'기계학습을 이용한 문제 해결':'<article class="card"><h3>처음 배우는 사람을 위한 완전한 설명</h3><p>기계학습은 모델부터 고르는 것이 아니라 문제를 정확히 말로 정리하는 것부터 시작한다. 예를 들어 “학생 성적을 예측한다”보다 “출석률·과제 점수·공부 시간으로 다음 시험 점수를 예측한다”가 훨씬 명확하다. 무엇을 입력 X로 쓸지, 무엇을 정답 y로 삼을지가 정해져야 데이터를 모을 수 있다.</p><p>전처리는 지저분한 재료를 요리 전에 손질하는 것과 같다. 빈칸, 오타, 단위가 뒤섞인 값, 너무 이상한 값을 확인한다. 특성 공학은 재료에서 새 정보를 뽑는 일이다. 날짜 자체보다 요일·주말 여부가 더 도움이 될 수 있다. 모델은 데이터에 없는 정보를 마법처럼 알 수 없으므로 이 단계가 중요하다.</p><p>평가는 훈련 문제를 다시 푸는 것이 아니라 처음 보는 테스트 문제를 푸는 일이다. 훈련 점수만 높고 테스트 점수가 낮으면 과적합을 의심한다. 하이퍼파라미터 튜닝은 모델 설정을 바꿔 보며 일반화 성능을 높이는 반복 실험이다.</p></article>',
'정보 공유와 보호':'<article class="card"><h3>처음 배우는 사람을 위한 완전한 설명</h3><p>정보 공유는 정보를 무조건 많이 뿌리는 일이 아니다. 목적에 맞는 정보를 필요한 범위에서 나누는 일이다. 재난 문자, 버스 위치, 병원 진료 시간은 여러 사람이 알수록 안전과 편의가 커진다. 반면 친구의 전화번호, 주소, 건강 정보는 공개되면 당사자가 피해를 볼 수 있으므로 보호한다.</p><p>개인정보는 이름처럼 바로 알아볼 수 있는 정보뿐 아니라, 다른 정보와 합쳐서 누구인지 알아낼 수 있는 정보도 포함한다. 따라서 사진에서 얼굴을 가리거나 전화번호 가운데를 별표로 바꾸는 마스킹이 필요할 수 있다. 비식별화는 개인을 특정하기 어렵게 하면서도 분석에 쓸 수 있도록 위험을 줄이는 처리다.</p><p>정보를 요구받을 때는 ‘왜 필요한가, 꼭 필요한 양인가, 어디에 얼마나 보관하는가’를 생각한다. 공용 컴퓨터에서는 로그인 정보를 남기지 않는 것이 기본이다.</p></article>',
'정보 보안과 디지털 윤리':'<article class="card"><h3>처음 배우는 사람을 위한 완전한 설명</h3><p>보안은 비밀번호 하나를 만드는 일이 아니라 정보가 안전하게 존재하도록 관리하는 전체 활동이다. 기밀성은 허락된 사람만 보는 것, 무결성은 내용이 허락 없이 바뀌지 않는 것, 가용성은 필요할 때 서비스가 멈추지 않고 쓰이는 것이다. 은행 사이트가 공격으로 멈추면 가용성 문제, 성적이 바뀌면 무결성 문제다.</p><p>피싱·스미싱은 급한 마음을 이용해 가짜 링크를 누르게 만드는 경우가 많다. 모르는 링크는 바로 누르지 않고, 공식 앱이나 직접 입력한 주소로 확인한다. 보안 패치는 운영체제와 앱의 알려진 약점을 고치는 업데이트라서 미루지 않는 편이 안전하다.</p><p>디지털 윤리는 “걸리지 않으면 해도 된다”의 반대다. 타인의 계정·사진·개인정보·창작물을 함부로 다루지 않고, 기술로 생길 피해까지 고려하는 태도다.</p></article>'};function addTextbookExpansion(l){return textbookExpansion[l.title]||''}
function fullExplanation(l,q){let base=q[3],t=l.title,more='';if(t==='인공지능과 지능 에이전트')more='먼저 이 사례가 정보를 <b>받는 장치</b>인지, 실제로 움직이거나 출력하는 <b>행동 장치</b>인지 나눠 보세요. 정보를 받아들이면 센서·인식, 비교하여 고르면 판단, 바깥으로 결과를 내면 행동입니다. 다른 선택지는 이 세 단계의 역할을 서로 바꿔 놓은 경우가 많습니다.';else if(t==='기계학습의 이해')more='문제에서 가장 먼저 찾아야 할 말은 <b>정답이 주어졌는가</b>와 <b>결과가 종류인가 수치인가</b>입니다. 정답이 있으면 지도학습, 없으면 비지도학습입니다. 종류를 고르면 분류, 이어지는 양을 예측하면 회귀입니다. 이 기준을 먼저 세우면 낯선 사례도 풀 수 있습니다.';else if(t==='기계학습을 이용한 문제 해결')more='이 문제는 “학습 전인가, 학습 중인가, 학습 후인가”를 구분하면 쉽습니다. 학습 전 데이터 손질은 전처리, 새 입력값을 만드는 것은 특성 공학, 학습 뒤 처음 보는 데이터로 확인하는 것은 평가입니다. 설정값을 사람이 바꾸는 것은 하이퍼파라미터 튜닝입니다.';else if(t==='디지털 기술과 진로 설계')more='디지털 기술 이름만 외우지 말고, 어떤 분야의 일을 어떻게 바꾸는지 연결해 보세요. 단순히 기기를 쓰는 것은 DX의 전부가 아니고, 데이터와 기술로 업무·서비스·의사결정 방식을 바꾸는 것이 핵심입니다.';else if(t==='정보 공유와 보호')more='이 문제는 “공개했을 때 개인이 식별되거나 피해를 볼 수 있는가”를 기준으로 판단하세요. 많은 사람의 안전·편의에 도움이 되는 정보는 공유 가치가 크지만, 개인을 알아볼 수 있는 정보는 목적·동의·최소 수집 원칙을 먼저 생각해야 합니다.';else if(t==='정보 보안과 디지털 윤리')more='상황을 CIA 세 칸에 넣어 보세요. 남이 보면 기밀성, 내용이 바뀌면 무결성, 서비스를 못 쓰면 가용성 문제입니다. 공격 이름은 전달 방식도 힌트입니다. 문자면 스미싱, 가짜 사이트 유도면 피싱입니다.';else if(t==='딕셔너리')more='중괄호가 보이면 딕셔너리입니다. 먼저 키와 값을 찾고, 대괄호 안의 키로 어떤 값을 꺼내는지 보세요. 없는 키에서 오류가 걱정되면 get, 값을 꺼내면서 지우면 pop이라는 역할 차이를 적용합니다.';else if(t==='함수')more='함수 문제는 정의와 호출을 구분하세요. def만 있으면 실행되지 않습니다. 호출할 때 전달한 값과 기본값을 매개변수에 넣고, print는 화면 출력, return은 결과 전달이라는 순서로 읽으면 됩니다.';else if(t==='문자열')more='문자열은 0번부터 세고, 슬라이싱 끝 번호는 포함하지 않습니다. 또 문자열은 불변이라 replace·strip 결과를 변수에 다시 저장하지 않으면 원본은 그대로입니다. split은 리스트를 만들고 join은 리스트를 문자열로 만든다는 방향도 확인하세요.';else if(t==='파일 입출력')more='파일 문제는 open의 모드부터 확인하세요. r은 읽기, w는 덮어쓰기, a는 뒤에 추가입니다. 다음으로 read가 전체 문자열인지, readline이 한 줄인지, readlines가 리스트인지 확인하면 됩니다.';else if(t==='객체지향(OOP)')more='class는 설계도, 객체는 그 설계도로 만든 실제 대상입니다. 객체를 만드는 줄을 찾고 __init__에서 self에 무엇이 저장되는지, 그 다음 어떤 메서드를 호출하는지 순서대로 보면 출력과 개념을 함께 이해할 수 있습니다.';else if(t==='Pandas 데이터 분석')more='Pandas 문제는 괄호와 기준을 천천히 보세요. 대괄호 한 겹의 열 하나는 Series, 두 겹은 DataFrame입니다. loc는 이름표 기준, iloc는 자리 번호 기준입니다. 결측치를 지우는지 채우는지도 메서드 이름으로 구분합니다.';return base+'<br><br><b>풀이를 이렇게 생각하세요.</b><br>'+more}
</script></body></html>
